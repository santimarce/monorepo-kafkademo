spring.application.name=gateway
server.port=8080

# Conexión a Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Configuración de rutas
spring.cloud.gateway.mvc.routes[0].id=clients
spring.cloud.gateway.mvc.routes[0].uri=lb://clients
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/clients/**

spring.cloud.gateway.mvc.routes[1].id=insurance
spring.cloud.gateway.mvc.routes[1].uri=lb://insurance-policy
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/insurance/**

spring.cloud.gateway.mvc.routes[2].id=claims
spring.cloud.gateway.mvc.routes[2].uri=lb://claims
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/claims/**

spring.cloud.gateway.mvc.routes[3].id=notifications
spring.cloud.gateway.mvc.routes[3].uri=lb://notifications
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/notifications/**
